<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Polaroid Studio 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Permanent+Marker&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #3b82f6;
            --bg: #050505;
            --panel: rgba(18, 18, 20, 0.9);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
        }

        .viewport {
            flex: 1;
            min-height: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: radial-gradient(circle at 50% 40%, #1a1a1e 0%, #050505 100%);
            position: relative;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            background: #fff;
            touch-action: none;
            border-radius: 2px;
            object-fit: contain;
        }

        #magnifier {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            pointer-events: none;
            display: none;
            z-index: 100;
            background-color: #fff;
            overflow: hidden;
        }

        .controls {
            flex-shrink: 0;
            height: 42dvh;
            min-height: 320px;
            background: var(--panel);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            display: flex;
            flex-direction: column;
            padding-bottom: var(--safe-bottom);
            z-index: 50;
        }

        .tab-bar {
            display: flex;
            padding: 20px 24px 10px;
            gap: 24px;
        }

        .tab-btn {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #666;
            position: relative;
            padding-bottom: 8px;
            transition: color 0.3s;
        }

        .tab-btn.active {
            color: #fff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent);
            border-radius: 3px;
        }

        .settings-pane {
            flex: 1;
            overflow-y: auto;
            padding: 12px 24px 20px;
            -webkit-overflow-scrolling: touch;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 4px;
            outline: none;
            margin: 12px 0 20px 0;
            background: #2a2a2e;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: #fff;
            border-radius: 50%;
            border: 3px solid #000;
            cursor: pointer;
        }

        #redChan { background: linear-gradient(to right, #2a2a2e, #ff4444); }
        #greenChan { background: linear-gradient(to right, #2a2a2e, #22c55e); }
        #blueChan { background: linear-gradient(to right, #2a2a2e, #3b82f6); }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 800;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-val { color: #fff; font-weight: 600; }

        .btn-main {
            background: #fff;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px;
            border-radius: 14px;
            font-size: 13px;
            transition: transform 0.1s;
        }

        .btn-main:active { transform: scale(0.96); }
        .marker-font { font-family: 'Permanent Marker', cursive; }
    </style>
</head>
<body>

    <div class="viewport" id="viewport">
        <canvas id="mainCanvas"></canvas>
        <div id="magnifier">
            <canvas id="magCanvas"></canvas>
        </div>
        <div id="emptyState" class="absolute flex flex-col items-center opacity-30 pointer-events-none">
            <div class="w-16 h-16 border-2 border-dashed border-white/40 rounded-full flex items-center justify-center mb-4">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            <p class="text-[10px] font-bold uppercase tracking-[0.3em]">Load Negative</p>
        </div>
        <div id="zoomHint" class="absolute bottom-4 text-[9px] font-bold tracking-[0.2em] text-white/40 uppercase hidden">Long press to zoom</div>
    </div>

    <div class="controls">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('optics', this)">Optics</button>
            <button class="tab-btn" onclick="switchTab('color', this)">Color</button>
            <button class="tab-btn" onclick="switchTab('finish', this)">Finish</button>
        </div>

        <div class="settings-pane" id="opticsPane">
            <div>
                <div class="control-label"><span>Magnification</span><span class="control-val" id="zoomVal">1.0x</span></div>
                <input type="range" id="zoom" min="0.5" max="3.5" step="0.01" value="1.0">
            </div>
            <div>
                <div class="control-label"><span>Orientation</span><span class="control-val" id="rotVal">0°</span></div>
                <input type="range" id="rotation" min="-180" max="180" value="0">
            </div>
            <div>
                <div class="control-label"><span>Bokeh (Lens Blur)</span><span class="control-val" id="bokehVal">0</span></div>
                <input type="range" id="bokeh" min="0" max="60" value="0">
            </div>
        </div>

        <div class="settings-pane hidden" id="colorPane">
            <div>
                <div class="control-label"><span>Exposure</span><span class="control-val" id="expVal">100%</span></div>
                <input type="range" id="exposure" min="40" max="160" value="100">
            </div>
            <div>
                <div class="control-label"><span>Contrast</span><span class="control-val" id="conVal">100%</span></div>
                <input type="range" id="contrast" min="40" max="160" value="100">
            </div>
            <div class="mt-2">
                <div class="control-label"><span>Red Tint</span><span class="control-val" id="redVal">0</span></div>
                <input type="range" id="redChan" min="-50" max="50" value="0">
            </div>
            <div>
                <div class="control-label"><span>Green Tint</span><span class="control-val" id="greenVal">0</span></div>
                <input type="range" id="greenChan" min="-50" max="50" value="0">
            </div>
            <div>
                <div class="control-label"><span>Blue Tint</span><span class="control-val" id="blueVal">0</span></div>
                <input type="range" id="blueChan" min="-50" max="50" value="0">
            </div>
        </div>

        <div class="settings-pane hidden" id="finishPane">
            <div>
                <div class="control-label"><span>Film Grain</span><span class="control-val" id="grainVal">15</span></div>
                <input type="range" id="grain" min="0" max="100" value="15">
            </div>
            <div class="mt-1">
                <div class="control-label"><span>Marker Annotation</span></div>
                <input type="text" id="markerText" placeholder="Write something..." 
                    class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 mt-2 mb-4 text-white marker-font outline-none focus:border-blue-500/50 text-base">
            </div>
            <div>
                <div class="control-label"><span>Text Size</span><span class="control-val" id="textSizeVal">1.0x</span></div>
                <input type="range" id="textSize" min="0.5" max="3" step="0.1" value="1.0">
            </div>
        </div>

        <div class="p-4 flex gap-3 mt-auto border-t border-white/10">
            <label class="flex-1">
                <div class="w-full h-full flex items-center justify-center bg-white/5 border border-white/10 rounded-xl font-bold text-[10px] uppercase tracking-widest active:bg-white/10 cursor-pointer transition-colors">Import</div>
                <input type="file" id="imgInput" accept="image/*" class="hidden">
            </label>
            <button id="exportBtn" class="btn-main flex-[2]">Save Polaroid</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    // Internal Studio Dimensions
    const BASE_S = 2400;
    const MARGIN = 160;
    const FOOTER = 640;
    const TOTAL_W = BASE_S + (MARGIN * 2);
    const TOTAL_H = BASE_S + MARGIN + FOOTER;

    // Buffer for iOS compatibility (Filters can be finicky on iOS canvases)
    const bufferCanvas = document.createElement('canvas');
    const bCtx = bufferCanvas.getContext('2d');
    
    const noiseCanvas = document.createElement('canvas');
    noiseCanvas.width = 512; 
    noiseCanvas.height = 512;
    const nCtx = noiseCanvas.getContext('2d');
    const nData = nCtx.createImageData(512, 512);
    for(let i=0; i<nData.data.length; i+=4) {
        const v = Math.random() * 255;
        nData.data[i] = v; nData.data[i+1] = v; nData.data[i+2] = v; nData.data[i+3] = 255;
    }
    nCtx.putImageData(nData, 0, 0);
    let noisePattern = null;

    let state = {
        img: null,
        x: 0, y: 0,
        lastX: 0, lastY: 0,
        isDragging: false,
        isZooming: false
    };

    const ui = {};
    ['zoom', 'rotation', 'bokeh', 'exposure', 'contrast', 'redChan', 'greenChan', 'blueChan', 'grain', 'markerText', 'textSize']
    .forEach(id => {
        ui[id] = document.getElementById(id);
        ui[id].oninput = () => {
            updateLabels();
            draw(false);
        };
    });

    function updateLabels() {
        document.getElementById('zoomVal').innerText = parseFloat(ui.zoom.value).toFixed(1) + 'x';
        document.getElementById('rotVal').innerText = ui.rotation.value + '°';
        document.getElementById('bokehVal').innerText = ui.bokeh.value;
        document.getElementById('expVal').innerText = ui.exposure.value + '%';
        document.getElementById('conVal').innerText = ui.contrast.value + '%';
        document.getElementById('redVal').innerText = ui.redChan.value;
        document.getElementById('greenVal').innerText = ui.greenChan.value;
        document.getElementById('blueVal').innerText = ui.blueChan.value;
        document.getElementById('grainVal').innerText = ui.grain.value;
        document.getElementById('textSizeVal').innerText = parseFloat(ui.textSize.value).toFixed(1) + 'x';
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.settings-pane').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId + 'Pane').classList.remove('hidden');
        btn.classList.add('active');
    }

    imgInput.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (v) => {
            const img = new Image();
            img.onload = () => {
                state.img = img;
                state.x = 0; state.y = 0;
                ui.zoom.value = 1.0;
                updateLabels();
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('zoomHint').classList.remove('hidden');
                draw(true);
            };
            img.src = v.target.result;
        };
        reader.readAsDataURL(file);
    };

    function draw(highRes = false) {
        if(!state.img) return;
        
        const s = highRes ? 1 : (Math.min(window.innerWidth * 2, 1000) / TOTAL_W);
        canvas.width = TOTAL_W * s;
        canvas.height = TOTAL_H * s;

        // Reset context state for each draw to fix iOS artifacts
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const m = MARGIN * s;
        const b = BASE_S * s;
        
        const z = parseFloat(ui.zoom.value);
        const r = parseInt(ui.rotation.value) * Math.PI / 180;
        let dw, dh;
        const aspect = state.img.width / state.img.height;
        if(aspect > 1) { dh = b * z; dw = dh * aspect; }
        else { dw = b * z; dh = dw / aspect; }

        ctx.save();
        ctx.beginPath();
        ctx.rect(m, m, b, b);
        ctx.clip();

        // COMPATIBILITY FIX: Apply filters to an offscreen buffer first
        // This is much more reliable on mobile Safari
        bufferCanvas.width = b;
        bufferCanvas.height = b;
        bCtx.clearRect(0, 0, b, b);
        bCtx.save();
        bCtx.translate(b/2 + state.x * s, b/2 + state.y * s);
        bCtx.rotate(r);
        
        // Apply exposure and contrast via filter string
        bCtx.filter = `brightness(${ui.exposure.value}%) contrast(${ui.contrast.value}%)`;
        bCtx.drawImage(state.img, -dw/2, -dh/2, dw, dh);
        bCtx.restore();

        // Draw the processed buffer onto main canvas
        ctx.drawImage(bufferCanvas, m, m);

        // Bokeh (Lens Blur) - Rendered over the top with a gradient mask
        const bokehVal = parseFloat(ui.bokeh.value) * s;
        if (bokehVal > 0) {
            bCtx.clearRect(0, 0, b, b);
            bCtx.save();
            bCtx.translate(b/2 + state.x * s, b/2 + state.y * s);
            bCtx.rotate(r);
            bCtx.filter = `brightness(${ui.exposure.value}%) contrast(${ui.contrast.value}%) blur(${bokehVal}px)`;
            bCtx.drawImage(state.img, -dw/2, -dh/2, dw, dh);
            bCtx.restore();

            // Create radial mask for focus point
            bCtx.globalCompositeOperation = 'destination-out';
            const gradRadius = b * 0.6;
            const gradient = bCtx.createRadialGradient(b/2, b/2, 0, b/2, b/2, gradRadius);
            gradient.addColorStop(0, 'rgba(0,0,0,1)');
            gradient.addColorStop(0.3, 'rgba(0,0,0,1)');
            gradient.addColorStop(0.9, 'rgba(0,0,0,0)');
            bCtx.fillStyle = gradient;
            bCtx.fillRect(0, 0, b, b);
            
            ctx.drawImage(bufferCanvas, m, m);
        }

        // Tints
        ctx.globalCompositeOperation = 'overlay';
        ctx.fillStyle = `rgb(${128+parseInt(ui.redChan.value)}, ${128+parseInt(ui.greenChan.value)}, ${128+parseInt(ui.blueChan.value)})`;
        ctx.fillRect(m, m, b, b);
        
        // Grain
        if(ui.grain.value > 0) {
            if(!noisePattern) noisePattern = ctx.createPattern(noiseCanvas, 'repeat');
            ctx.globalAlpha = ui.grain.value / 100;
            ctx.fillStyle = noisePattern;
            ctx.fillRect(m, m, b, b);
        }

        ctx.restore();

        // Annotation
        if(ui.markerText.value) {
            const sizeMultiplier = parseFloat(ui.textSize.value);
            ctx.font = `${100 * s * sizeMultiplier}px 'Permanent Marker'`;
            ctx.fillStyle = "rgba(20,20,40,0.8)";
            ctx.textAlign = "center";
            ctx.save();
            ctx.translate(canvas.width/2, (TOTAL_H - FOOTER/2 + (25 * sizeMultiplier)) * s);
            ctx.rotate(-0.012);
            ctx.fillText(ui.markerText.value, 0, 0);
            ctx.restore();
        }

        if(!highRes) {
            clearTimeout(window.rTimer);
            window.rTimer = setTimeout(() => draw(true), 400);
        }
    }

    // Interactions
    const viewport = document.getElementById('viewport');
    const magnifier = document.getElementById('magnifier');
    const magCanvas = document.getElementById('magCanvas');
    const mCtx = magCanvas.getContext('2d');
    let zoomTimer;

    const getPos = (e) => {
        const t = e.touches ? e.touches[0] : e;
        const rect = canvas.getBoundingClientRect();
        return {
            x: (t.clientX - rect.left) * (canvas.width / rect.width),
            y: (t.clientY - rect.top) * (canvas.height / rect.height),
            screenX: t.clientX,
            screenY: t.clientY
        };
    };

    const startZoom = (e) => {
        if(!state.img) return;
        state.isZooming = true;
        magnifier.style.display = 'block';
        updateZoom(e);
    };

    const updateZoom = (e) => {
        if(!state.isZooming) return;
        const pos = getPos(e);
        
        // Position circle
        magnifier.style.left = `${pos.screenX - 90}px`;
        magnifier.style.top = `${pos.screenY - 200}px`;

        // Render zoom content
        magCanvas.width = 180;
        magCanvas.height = 180;
        mCtx.fillStyle = '#fff';
        mCtx.fillRect(0,0,180,180);
        
        const zoomFactor = 2.5;
        mCtx.drawImage(
            canvas, 
            pos.x - (90/zoomFactor), pos.y - (90/zoomFactor), 180/zoomFactor, 180/zoomFactor,
            0, 0, 180, 180
        );
    };

    viewport.addEventListener('mousedown', (e) => {
        if(!state.img) return;
        zoomTimer = setTimeout(() => startZoom(e), 250);
        state.isDragging = true;
        state.lastX = e.clientX; state.lastY = e.clientY;
    });

    viewport.addEventListener('touchstart', (e) => {
        if(!state.img) return;
        if(e.touches.length === 1) {
            zoomTimer = setTimeout(() => startZoom(e), 400);
            state.isDragging = true;
            state.lastX = e.touches[0].clientX; state.lastY = e.touches[0].clientY;
        }
    }, {passive: false});

    window.addEventListener('mousemove', (e) => {
        if(state.isZooming) { updateZoom(e); return; }
        if(!state.isDragging || !state.img) return;
        clearTimeout(zoomTimer);
        const f = TOTAL_W / canvas.clientWidth;
        state.x += (e.clientX - state.lastX) * f;
        state.y += (e.clientY - state.lastY) * f;
        state.lastX = e.clientX; state.lastY = e.clientY;
        draw(false);
    });

    window.addEventListener('touchmove', (e) => {
        if(state.isZooming) { e.preventDefault(); updateZoom(e); return; }
        if(!state.isDragging || !state.img) return;
        clearTimeout(zoomTimer);
        const f = TOTAL_W / canvas.clientWidth;
        state.x += (e.touches[0].clientX - state.lastX) * f;
        state.y += (e.touches[0].clientY - state.lastY) * f;
        state.lastX = e.touches[0].clientX; state.lastY = e.touches[0].clientY;
        draw(false);
    }, {passive: false});

    const endAll = () => {
        clearTimeout(zoomTimer);
        state.isDragging = false;
        state.isZooming = false;
        magnifier.style.display = 'none';
    };

    window.addEventListener('mouseup', endAll);
    window.addEventListener('touchend', endAll);

    // Save
    document.getElementById('exportBtn').addEventListener('click', function() {
        if(!state.img) return;
        const btn = this;
        btn.innerText = "DEVELOPING...";
        btn.disabled = true;

        setTimeout(() => {
            try {
                draw(true); 
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `polaroid_${Date.now()}.jpg`;
                    document.body.appendChild(link);
                    link.click();
                    setTimeout(() => {
                        document.body.removeChild(link);
                        window.URL.revokeObjectURL(url);
                        btn.innerText = "Save Polaroid";
                        btn.disabled = false;
                    }, 100);
                }, 'image/jpeg', 0.95);
            } catch (e) {
                btn.innerText = "Error Saving";
                setTimeout(() => { btn.innerText = "Save Polaroid"; btn.disabled = false; }, 2000);
            }
        }, 150);
    });
</script>
</body>
</html>
