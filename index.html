<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Polaroid Studio 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Permanent+Marker&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #3b82f6;
            --bg: #000;
            --panel: rgba(15, 15, 18, 0.98);
            --safe-bottom: env(safe-area-inset-bottom, 24px);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
        }

        .viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: #0a0a0a;
            position: relative;
            overflow: hidden;
        }

        canvas {
            max-width: 95%;
            max-height: 95%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.9);
            background: #fff;
            touch-action: none;
            border-radius: 1px;
        }

        .controls {
            flex-shrink: 0;
            height: 38dvh;
            min-height: 340px;
            background: var(--panel);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            display: flex;
            flex-direction: column;
            padding-bottom: var(--safe-bottom);
            z-index: 50;
        }

        .tab-bar {
            display: flex;
            padding: 16px 20px 8px;
            gap: 20px;
            justify-content: center;
        }

        .tab-btn {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #444;
            position: relative;
            padding: 8px 12px;
        }

        .tab-btn.active { color: #fff; }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: var(--accent); border-radius: 3px;
        }

        .settings-pane {
            flex: 1;
            overflow-y: auto;
            padding: 10px 24px;
            -webkit-overflow-scrolling: touch;
        }

        .control-group { margin-bottom: 22px; }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%; height: 12px; border-radius: 6px; margin: 14px 0; background: #1a1a1e;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 34px; height: 34px; background: #fff; border-radius: 50%; border: 4px solid #000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #redChan { background: linear-gradient(to right, #330000, #ff0000); }
        #greenChan { background: linear-gradient(to right, #003300, #00ff00); }
        #blueChan { background: linear-gradient(to right, #000033, #0000ff); }

        .control-label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; color: #777; text-transform: uppercase; }
        .control-val { color: #fff; }

        #previewOverlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 16px;
        }
        #previewImg { max-width: 100%; max-height: 82vh; border-radius: 2px; }

        .btn-main {
            background: #fff; color: #000; font-weight: 800; text-transform: uppercase; 
            padding: 18px; border-radius: 16px; font-size: 13px; width: 100%;
        }
        .marker-font { font-family: 'Permanent Marker', cursive; }
    </style>
</head>
<body>

    <div class="viewport" id="viewport">
        <canvas id="mainCanvas"></canvas>
        <div id="emptyState" class="absolute flex flex-col items-center opacity-20 pointer-events-none">
            <p class="text-[10px] font-bold uppercase tracking-[0.4em]">Negative Required</p>
        </div>
        <button onclick="showPreview()" id="inspectBtn" class="absolute bottom-6 right-6 w-14 h-14 bg-white/10 backdrop-blur-xl border border-white/20 rounded-full flex items-center justify-center hidden active:scale-90 transition-transform">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        </button>
    </div>

    <div class="controls">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('optics', this)">Photo</button>
            <button class="tab-btn" onclick="switchTab('color', this)">Chemicals</button>
            <button class="tab-btn" onclick="switchTab('finish', this)">Final Touch</button>
        </div>

        <div class="settings-pane" id="opticsPane">
            <div class="control-group">
                <div class="control-label"><span>Zoom</span><span class="control-val" id="zoomVal">1.0x</span></div>
                <input type="range" id="zoom" min="0.5" max="3.5" step="0.01" value="1.0">
            </div>
            <div class="control-group">
                <div class="control-label"><span>Rotation</span><span class="control-val" id="rotVal">0°</span></div>
                <input type="range" id="rotation" min="-180" max="180" value="0">
            </div>
            <div class="control-group">
                <div class="control-label"><span>Bokeh (Center Sharp)</span><span class="control-val" id="bokehVal">0</span></div>
                <input type="range" id="bokeh" min="0" max="60" value="0">
            </div>
        </div>

        <div class="settings-pane hidden" id="colorPane">
            <div class="control-group">
                <div class="control-label"><span>Exposure</span><span class="control-val" id="expVal">100%</span></div>
                <input type="range" id="exposure" min="40" max="180" value="100">
            </div>
            <div class="control-group">
                <div class="control-label"><span>Contrast</span><span class="control-val" id="conVal">100%</span></div>
                <input type="range" id="contrast" min="40" max="180" value="100">
            </div>
            <div class="control-label"><span>RGB Tints</span></div>
            <div class="flex flex-col gap-1 mt-2">
                <input type="range" id="redChan" min="-50" max="50" value="0" class="!my-2">
                <input type="range" id="greenChan" min="-50" max="50" value="0" class="!my-2">
                <input type="range" id="blueChan" min="-50" max="50" value="0" class="!my-2">
            </div>
        </div>

        <div class="settings-pane hidden" id="finishPane">
            <div class="control-group">
                <div class="control-label"><span>Powerful Grain</span><span class="control-val" id="grainVal">30</span></div>
                <input type="range" id="grain" min="0" max="250" value="30">
            </div>
            <div class="control-group">
                <div class="control-label"><span>Photo Gloss (Shine)</span><span class="control-val" id="glossVal">0</span></div>
                <input type="range" id="gloss" min="0" max="100" value="0">
            </div>
            <input type="text" id="markerText" placeholder="Marker scribble..." 
                class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 mb-4 text-white marker-font outline-none text-lg">
            <div class="control-group">
                <div class="control-label"><span>Text Scale</span><span class="control-val" id="textSizeVal">1.0x</span></div>
                <input type="range" id="textSize" min="0.5" max="3" step="0.1" value="1.0">
            </div>
        </div>

        <div class="px-6 py-4 flex gap-4 mt-auto border-t border-white/5">
            <label class="flex-1">
                <div class="w-full h-full flex items-center justify-center bg-white/5 border border-white/10 rounded-2xl font-bold text-[11px] uppercase tracking-[0.2em] active:bg-white/10">Load</div>
                <input type="file" id="imgInput" accept="image/*" class="hidden">
            </label>
            <button id="exportBtn" class="btn-main flex-[2.5] active:scale-[0.98] transition-transform">Save Polaroid</button>
        </div>
    </div>

    <div id="previewOverlay" onclick="hidePreview()">
        <p class="text-white/40 text-[10px] font-bold uppercase tracking-[0.3em] mb-4">Tap to close • Long-press to save to photos</p>
        <img id="previewImg" src="" alt="Polaroid Preview">
        <button class="mt-8 px-10 py-4 bg-white/5 rounded-full text-[11px] font-bold uppercase tracking-widest border border-white/10">Return to Studio</button>
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const BASE_S = 2400, MARGIN = 160, FOOTER = 640;
    const TOTAL_W = BASE_S + (MARGIN * 2), TOTAL_H = BASE_S + MARGIN + FOOTER;

    const buffer = document.createElement('canvas');
    const bCtx = buffer.getContext('2d');
    
    const noiseBuffer = document.createElement('canvas');
    const nCtx = noiseBuffer.getContext('2d');
    function updateNoise() {
        noiseBuffer.width = 512; noiseBuffer.height = 512;
        const idata = nCtx.createImageData(512, 512);
        for(let i=0; i<idata.data.length; i+=4) {
            const v = Math.random() > 0.5 ? (Math.random() * 255) : (Math.random() * 64);
            idata.data[i] = v; idata.data[i+1] = v; idata.data[i+2] = v; idata.data[i+3] = 255;
        }
        nCtx.putImageData(idata, 0, 0);
    }
    updateNoise();

    let state = { img: null, x: 0, y: 0, lastX: 0, lastY: 0, isDragging: false };

    const ui = {};
    ['zoom', 'rotation', 'bokeh', 'exposure', 'contrast', 'redChan', 'greenChan', 'blueChan', 'grain', 'gloss', 'markerText', 'textSize']
    .forEach(id => {
        ui[id] = document.getElementById(id);
        ui[id].oninput = () => { updateLabels(); draw(false); };
    });

    function updateLabels() {
        document.getElementById('zoomVal').innerText = parseFloat(ui.zoom.value).toFixed(1) + 'x';
        document.getElementById('rotVal').innerText = ui.rotation.value + '°';
        document.getElementById('bokehVal').innerText = ui.bokeh.value;
        document.getElementById('expVal').innerText = ui.exposure.value + '%';
        document.getElementById('conVal').innerText = ui.contrast.value + '%';
        document.getElementById('grainVal').innerText = ui.grain.value;
        document.getElementById('glossVal').innerText = ui.gloss.value;
        document.getElementById('textSizeVal').innerText = parseFloat(ui.textSize.value).toFixed(1) + 'x';
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.settings-pane').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId + 'Pane').classList.remove('hidden');
        btn.classList.add('active');
    }

    imgInput.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (v) => {
            const img = new Image();
            img.onload = () => {
                state.img = img;
                state.x = 0; state.y = 0;
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('inspectBtn').classList.remove('hidden');
                draw(true);
            };
            img.src = v.target.result;
        };
        reader.readAsDataURL(file);
    };

    function applyColorCorrection(context, w, h) {
        const exp = parseFloat(ui.exposure.value) / 100;
        const con = parseFloat(ui.contrast.value) / 100;
        const rT = parseInt(ui.redChan.value);
        const gT = parseInt(ui.greenChan.value);
        const bT = parseInt(ui.blueChan.value);
        const idata = context.getImageData(0, 0, w, h);
        const d = idata.data;
        const intercept = 128 * (1 - con);
        for (let i = 0; i < d.length; i += 4) {
            d[i] = ((d[i] * exp) * con + intercept) + rT;
            d[i+1] = ((d[i+1] * exp) * con + intercept) + gT;
            d[i+2] = ((d[i+2] * exp) * con + intercept) + bT;
        }
        context.putImageData(idata, 0, 0);
    }

    function draw(highRes = false) {
        if(!state.img) return;
        const s = highRes ? 1 : (Math.min(window.innerWidth * 2, 800) / TOTAL_W);
        canvas.width = TOTAL_W * s; canvas.height = TOTAL_H * s;
        
        ctx.fillStyle = "#ffffff"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const m = MARGIN * s, b = BASE_S * s, z = parseFloat(ui.zoom.value);
        const r = parseInt(ui.rotation.value) * Math.PI / 180;
        const aspect = state.img.width / state.img.height;
        let dw = aspect > 1 ? (b * z * aspect) : (b * z), dh = aspect > 1 ? (b * z) : (b * z / aspect);

        buffer.width = b; buffer.height = b;
        bCtx.fillStyle = "#000"; bCtx.fillRect(0, 0, b, b);
        bCtx.save();
        bCtx.translate(b/2 + state.x * s, b/2 + state.y * s);
        bCtx.rotate(r);
        bCtx.drawImage(state.img, -dw/2, -dh/2, dw, dh);
        bCtx.restore();
        applyColorCorrection(bCtx, b, b);

        // Render Photo with Edge Bokeh
        ctx.save();
        ctx.beginPath(); 
        ctx.rect(m, m, b, b); 
        ctx.clip(); 

        const bokeh = parseFloat(ui.bokeh.value) * s;
        if(bokeh > 1) {
            ctx.drawImage(buffer, m, m);
            ctx.save();
            ctx.filter = `blur(${bokeh}px)`;
            const mask = document.createElement('canvas');
            mask.width = b; mask.height = b;
            const mCtx = mask.getContext('2d');
            mCtx.drawImage(buffer, 0, 0);
            mCtx.globalCompositeOperation = 'destination-in';
            const grad = mCtx.createRadialGradient(b/2, b/2, 0, b/2, b/2, b/2);
            grad.addColorStop(0.3, 'rgba(0,0,0,0)'); 
            grad.addColorStop(0.9, 'rgba(0,0,0,1)'); 
            mCtx.fillStyle = grad;
            mCtx.fillRect(0,0,b,b);
            ctx.drawImage(mask, m, m);
            ctx.restore();
        } else {
            ctx.drawImage(buffer, m, m);
        }

        // Apply Grain
        const gVal = parseInt(ui.grain.value);
        if(gVal > 0) {
            ctx.save();
            ctx.globalCompositeOperation = 'soft-light';
            // Increased power of grain alpha
            ctx.globalAlpha = Math.min(1.0, gVal / 100);
            const ptrn = ctx.createPattern(noiseBuffer, 'repeat');
            ctx.fillStyle = ptrn;
            ctx.fillRect(m, m, b, b);
            ctx.restore();
        }

        // Apply Shine/Gloss
        const glossVal = parseInt(ui.gloss.value);
        if(glossVal > 0) {
            ctx.save();
            ctx.globalAlpha = glossVal / 100;
            const glossGrad = ctx.createLinearGradient(m, m, m + b, m + b);
            glossGrad.addColorStop(0, 'rgba(255,255,255,0.4)');
            glossGrad.addColorStop(0.2, 'rgba(255,255,255,0.1)');
            glossGrad.addColorStop(0.5, 'rgba(255,255,255,0)');
            glossGrad.addColorStop(0.8, 'rgba(255,255,255,0.05)');
            glossGrad.addColorStop(1, 'rgba(255,255,255,0.15)');
            ctx.fillStyle = glossGrad;
            ctx.fillRect(m, m, b, b);
            ctx.restore();
        }
        ctx.restore(); 

        // Visual crop guide during interaction
        if(state.isDragging && !highRes) {
            ctx.save();
            ctx.translate(m + b/2 + state.x * s, m + b/2 + state.y * s);
            ctx.rotate(r);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
            ctx.lineWidth = 2 * s;
            ctx.setLineDash([10 * s, 10 * s]);
            ctx.strokeRect(-dw/2, -dh/2, dw, dh);
            ctx.restore();
        }

        if(ui.markerText.value) {
            const sm = parseFloat(ui.textSize.value);
            ctx.font = `${100 * s * sm}px 'Permanent Marker'`;
            ctx.fillStyle = "rgba(15,15,35,0.75)";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.save();
            const textY = TOTAL_H * s - (FOOTER * s / 2) + (20 * s);
            ctx.translate(canvas.width/2, textY);
            ctx.rotate(-0.015);
            ctx.fillText(ui.markerText.value, 0, 0);
            ctx.restore();
        }

        if(!highRes) {
            clearTimeout(window.rTimer);
            window.rTimer = setTimeout(() => draw(true), 500);
        }
    }

    const v = document.getElementById('viewport');
    const handleMove = (e) => {
        if(!state.isDragging || !state.img) return;
        const t = e.touches ? e.touches[0] : e;
        const f = TOTAL_W / canvas.clientWidth;
        state.x += (t.clientX - state.lastX) * f;
        state.y += (t.clientY - state.lastY) * f;
        state.lastX = t.clientX; state.lastY = t.clientY;
        draw(false);
    };

    v.addEventListener('mousedown', (e) => { state.isDragging = true; state.lastX = e.clientX; state.lastY = e.clientY; draw(false); });
    v.addEventListener('touchstart', (e) => { state.isDragging = true; state.lastX = e.touches[0].clientX; state.lastY = e.touches[0].clientY; draw(false); }, {passive: false});
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', (e) => { if(state.isDragging) e.preventDefault(); handleMove(e); }, {passive: false});
    window.addEventListener('mouseup', () => { state.isDragging = false; draw(false); });
    window.addEventListener('touchend', () => { state.isDragging = false; draw(false); });

    function showPreview() {
        if(!state.img) return;
        draw(true);
        const data = canvas.toDataURL('image/jpeg', 0.95);
        document.getElementById('previewImg').src = data;
        document.getElementById('previewOverlay').style.display = 'flex';
    }
    function hidePreview() { document.getElementById('previewOverlay').style.display = 'none'; }

    document.getElementById('exportBtn').addEventListener('click', function() {
        if(!state.img) return;
        const btn = this;
        btn.innerText = "DEVELOPING...";
        btn.disabled = true;
        setTimeout(() => {
            draw(true);
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `polaroid_studio_${Date.now()}.jpg`;
                document.body.appendChild(link);
                link.click();
                showPreview(); 
                setTimeout(() => {
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                    btn.innerText = "Save Polaroid";
                    btn.disabled = false;
                }, 100);
            }, 'image/jpeg', 0.95);
        }, 100);
    });

    updateLabels();
</script>
</body>
</html>
