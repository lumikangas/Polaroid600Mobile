<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Polaroid Studio 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Permanent+Marker&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #3b82f6;
            --bg: #050505;
            --panel: rgba(18, 18, 20, 0.8);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 2026 Streamlined Viewport */
        .viewport {
            flex: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle at 50% 40%, #1a1a1e 0%, #050505 100%);
            position: relative;
        }

        canvas {
            max-width: 100%;
            max-height: 95%;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            background: #fff;
            touch-action: none;
            border-radius: 2px;
        }

        /* Modernized Control Stack */
        .controls {
            flex: 1;
            background: var(--panel);
            backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            display: flex;
            flex-direction: column;
            padding-bottom: var(--safe-bottom);
            z-index: 50;
        }

        .tab-bar {
            display: flex;
            padding: 20px 24px 10px;
            gap: 20px;
        }

        .tab-btn {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #555;
            position: relative;
            padding-bottom: 8px;
            transition: color 0.3s;
        }

        .tab-btn.active {
            color: #fff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        .settings-pane {
            flex: 1;
            overflow-y: auto;
            padding: 10px 24px;
            -webkit-overflow-scrolling: touch;
        }

        /* Custom RGB Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            outline: none;
            margin: 12px 0;
            background: #222;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            border: 4px solid #000;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        #redChan { background: linear-gradient(to right, #000, #ff4444); }
        #greenChan { background: linear-gradient(to right, #000, #22c55e); }
        #blueChan { background: linear-gradient(to right, #000, #3b82f6); }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Next-Gen Preview Frame */
        .preview-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .iphone-17 {
            width: 82%;
            aspect-ratio: 9 / 19.5;
            background: #111;
            border: 6px solid #222;
            border-radius: 50px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        /* Minimal Notch */
        .iphone-17::after {
            content: '';
            position: absolute;
            top: 12px;
            width: 60px;
            height: 6px;
            background: #000;
            border-radius: 10px;
        }

        .btn-main {
            background: #fff;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 18px;
            border-radius: 18px;
            font-size: 12px;
            transition: transform 0.1s;
        }

        .btn-main:active { transform: scale(0.96); }

        .marker-font { font-family: 'Permanent Marker', cursive; }
    </style>
</head>
<body>

    <div class="viewport" id="viewport">
        <canvas id="mainCanvas"></canvas>
        <div id="emptyState" class="absolute flex flex-col items-center opacity-40">
            <div class="w-16 h-16 border-2 border-dashed border-white/20 rounded-full flex items-center justify-center mb-4">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            <p class="text-[9px] font-bold uppercase tracking-[0.3em]">Load Negative</p>
        </div>
    </div>

    <div class="controls">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('optics', this)">Optics</button>
            <button class="tab-btn" onclick="switchTab('color', this)">Color</button>
            <button class="tab-btn" onclick="switchTab('finish', this)">Finish</button>
        </div>

        <div class="settings-pane" id="opticsPane">
            <div class="mb-5">
                <div class="control-label"><span>Magnification</span><span id="zoomVal">1.0x</span></div>
                <input type="range" id="zoom" min="0.5" max="3.5" step="0.01" value="1.0">
            </div>
            <div class="mb-5">
                <div class="control-label"><span>Orientation</span><span id="rotVal">0°</span></div>
                <input type="range" id="rotation" min="-180" max="180" value="0">
            </div>
            <div class="mb-5">
                <div class="control-label"><span>Lens Softness</span></div>
                <input type="range" id="blur" min="0" max="40" value="0">
            </div>
        </div>

        <div class="settings-pane hidden" id="colorPane">
            <div class="mb-4">
                <div class="control-label"><span>Red Balance</span></div>
                <input type="range" id="redChan" min="-60" max="60" value="0">
            </div>
            <div class="mb-4">
                <div class="control-label"><span>Green Balance</span></div>
                <input type="range" id="greenChan" min="-60" max="60" value="0">
            </div>
            <div class="mb-4">
                <div class="control-label"><span>Blue Balance</span></div>
                <input type="range" id="blueChan" min="-60" max="60" value="0">
            </div>
            <div class="flex gap-4 mt-2">
                <div class="flex-1">
                    <div class="control-label"><span>Exposure</span></div>
                    <input type="range" id="exposure" min="40" max="160" value="100">
                </div>
                <div class="flex-1">
                    <div class="control-label"><span>Contrast</span></div>
                    <input type="range" id="contrast" min="40" max="160" value="100">
                </div>
            </div>
        </div>

        <div class="settings-pane hidden" id="finishPane">
            <div class="mb-5">
                <div class="control-label"><span>Film Grain Intensity</span></div>
                <input type="range" id="grain" min="0" max="100" value="15">
            </div>
            <div class="mb-5">
                <div class="control-label"><span>Marker Annotation</span></div>
                <input type="text" id="markerText" placeholder="Write on border..." 
                    class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mt-2 text-white marker-font outline-none focus:border-blue-500/50">
            </div>
        </div>

        <div class="p-6 flex gap-4">
            <label class="flex-1">
                <div class="w-full py-4 bg-white/5 border border-white/10 text-center rounded-2xl font-bold text-[10px] uppercase tracking-widest active:bg-white/10">Import</div>
                <input type="file" id="imgInput" accept="image/*" class="hidden">
            </label>
            <button id="exportBtn" class="btn-main flex-[2]">Develop Shot</button>
        </div>
    </div>

    <div class="preview-overlay" id="previewOverlay">
        <div class="iphone-17">
            <img id="iosPreview" src="" class="w-full h-full object-contain bg-white">
        </div>
        <div class="mt-8 flex flex-col items-center gap-4">
            <p class="text-[10px] uppercase tracking-[0.2em] text-zinc-500 font-bold">Long press to save to Photos</p>
            <button onclick="document.getElementById('previewOverlay').style.display='none'" 
                class="px-10 py-3 bg-white/10 rounded-full text-[10px] font-extrabold uppercase tracking-widest">Discard</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    // Pro Dimensions
    const BASE_S = 2400;
    const MARGIN = 160;
    const FOOTER = 640;
    const TOTAL_W = BASE_S + (MARGIN * 2);
    const TOTAL_H = BASE_S + MARGIN + FOOTER;

    let state = {
        img: null,
        x: 0, y: 0,
        lastX: 0, lastY: 0,
        isDragging: false,
        zoom: 1.0
    };

    const ctrlIds = ['zoom', 'rotation', 'blur', 'exposure', 'contrast', 'redChan', 'greenChan', 'blueChan', 'grain', 'markerText'];
    const ui = {};
    ctrlIds.forEach(id => {
        ui[id] = document.getElementById(id);
        ui[id].oninput = () => {
            if(id === 'zoom') document.getElementById('zoomVal').innerText = parseFloat(ui.zoom.value).toFixed(1) + 'x';
            if(id === 'rotation') document.getElementById('rotVal').innerText = ui.rotation.value + '°';
            draw(false);
        };
    });

    function switchTab(tabId, btn) {
        document.querySelectorAll('.settings-pane').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId + 'Pane').classList.remove('hidden');
        btn.classList.add('active');
    }

    imgInput.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (v) => {
            const img = new Image();
            img.onload = () => {
                state.img = img;
                state.x = 0; state.y = 0;
                document.getElementById('emptyState').classList.add('hidden');
                draw(true);
            };
            img.src = v.target.result;
        };
        reader.readAsDataURL(file);
    };

    function draw(highRes = false) {
        if(!state.img) return;
        
        const s = highRes ? 1 : (600 / TOTAL_W);
        canvas.width = TOTAL_W * s;
        canvas.height = TOTAL_H * s;

        // Base Layer
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const m = MARGIN * s;
        const b = BASE_S * s;
        
        ctx.save();
        ctx.beginPath();
        ctx.rect(m, m, b, b);
        ctx.clip();

        // Image Engine
        const z = parseFloat(ui.zoom.value);
        const r = parseInt(ui.rotation.value) * Math.PI / 180;
        let dw, dh;
        const aspect = state.img.width / state.img.height;
        
        if(aspect > 1) { dh = b * z; dw = dh * aspect; }
        else { dw = b * z; dh = dw / aspect; }

        ctx.translate(m + b/2 + state.x * s, m + b/2 + state.y * s);
        ctx.rotate(r);

        // Filters
        ctx.filter = `brightness(${ui.exposure.value}%) contrast(${ui.contrast.value}%) blur(${ui.blur.value * s}px)`;
        ctx.drawImage(state.img, -dw/2, -dh/2, dw, dh);
        ctx.filter = 'none';

        // RGB Chemical Balance
        ctx.globalCompositeOperation = 'overlay';
        ctx.fillStyle = `rgb(${128+parseInt(ui.redChan.value)}, ${128+parseInt(ui.greenChan.value)}, ${128+parseInt(ui.blueChan.value)})`;
        ctx.fillRect(-dw, -dh, dw*2, dh*2);
        ctx.globalCompositeOperation = 'source-over';

        // Grain Synthesis
        if(highRes && ui.grain.value > 0) {
            ctx.globalAlpha = ui.grain.value / 400;
            for(let i=0; i<120; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#000' : '#fff';
                ctx.fillRect(Math.random()*b - b/2, Math.random()*b - b/2, s*3, s*3);
            }
            ctx.globalAlpha = 1;
        }

        ctx.restore();

        // High-Quality Typography
        if(ui.markerText.value) {
            ctx.font = `${100 * s}px 'Permanent Marker'`;
            ctx.fillStyle = "rgba(15,15,30,0.75)";
            ctx.textAlign = "center";
            ctx.save();
            ctx.translate(canvas.width/2, (TOTAL_H - FOOTER/2 + 25) * s);
            ctx.rotate(-0.015);
            ctx.fillText(ui.markerText.value, 0, 0);
            ctx.restore();
        }

        if(!highRes) {
            clearTimeout(window.rTimer);
            window.rTimer = setTimeout(() => draw(true), 300);
        }
    }

    // Advanced Touch Manipulation
    const viewport = document.getElementById('viewport');
    const getEvt = (e) => e.touches ? e.touches[0] : e;

    const onStart = (e) => {
        if(!state.img) return;
        state.isDragging = true;
        const p = getEvt(e);
        state.lastX = p.clientX;
        state.lastY = p.clientY;
    };

    const onMove = (e) => {
        if(!state.isDragging) return;
        const p = getEvt(e);
        const f = TOTAL_W / canvas.clientWidth;
        state.x += (p.clientX - state.lastX) * f;
        state.y += (p.clientY - state.lastY) * f;
        state.lastX = p.clientX;
        state.lastY = p.clientY;
        draw(false);
    };

    viewport.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', () => state.isDragging = false);
    
    viewport.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, {passive:false});
    window.addEventListener('touchmove', (e) => { if(state.isDragging) e.preventDefault(); onMove(e); }, {passive:false});
    window.addEventListener('touchend', () => state.isDragging = false);

    // Export with 2026 Preview
    exportBtn.onclick = () => {
        if(!state.img) return;
        draw(true);
        document.getElementById('iosPreview').src = canvas.toDataURL('image/jpeg', 0.95);
        document.getElementById('previewOverlay').style.display = 'flex';
    };
</script>
</body>
</html>
