<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Polaroid Studio 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Permanent+Marker&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #3b82f6;
            --bg: #050505;
            --panel: rgba(18, 18, 20, 0.8);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Enlagred Viewport for better visibility */
        .viewport {
            flex: 1.8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: radial-gradient(circle at 50% 40%, #1a1a1e 0%, #050505 100%);
            position: relative;
        }

        canvas {
            max-width: 100%;
            max-height: 98%;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            background: #fff;
            touch-action: none;
            border-radius: 2px;
        }

        /* Compact Control Stack */
        .controls {
            flex: 0.8;
            background: var(--panel);
            backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            display: flex;
            flex-direction: column;
            padding-bottom: var(--safe-bottom);
            z-index: 50;
        }

        .tab-bar {
            display: flex;
            padding: 16px 24px 8px;
            gap: 20px;
        }

        .tab-btn {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #555;
            position: relative;
            padding-bottom: 8px;
            transition: color 0.3s;
        }

        .tab-btn.active {
            color: #fff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        .settings-pane {
            flex: 1;
            overflow-y: auto;
            padding: 8px 24px;
            -webkit-overflow-scrolling: touch;
        }

        /* Custom RGB Sliders - Compact */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            outline: none;
            margin: 8px 0;
            background: #222;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            border: 4px solid #000;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        #redChan { background: linear-gradient(to right, #000, #ff4444); }
        #greenChan { background: linear-gradient(to right, #000, #22c55e); }
        #blueChan { background: linear-gradient(to right, #000, #3b82f6); }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-main {
            background: #fff;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px;
            border-radius: 14px;
            font-size: 12px;
            transition: transform 0.1s;
        }

        .btn-main:active { transform: scale(0.96); }

        .btn-main:disabled {
            background: #666;
            color: #aaa;
            transform: none;
        }

        .marker-font { font-family: 'Permanent Marker', cursive; }
    </style>
</head>
<body>

    <div class="viewport" id="viewport">
        <canvas id="mainCanvas"></canvas>
        <div id="emptyState" class="absolute flex flex-col items-center opacity-40">
            <div class="w-16 h-16 border-2 border-dashed border-white/20 rounded-full flex items-center justify-center mb-4">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            <p class="text-[9px] font-bold uppercase tracking-[0.3em]">Load Negative</p>
        </div>
    </div>

    <div class="controls">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('optics', this)">Optics</button>
            <button class="tab-btn" onclick="switchTab('color', this)">Color</button>
            <button class="tab-btn" onclick="switchTab('finish', this)">Finish</button>
        </div>

        <div class="settings-pane" id="opticsPane">
            <div class="mb-3">
                <div class="control-label"><span>Magnification</span><span id="zoomVal">1.0x</span></div>
                <input type="range" id="zoom" min="0.5" max="3.5" step="0.01" value="1.0">
            </div>
            <div class="mb-3">
                <div class="control-label"><span>Orientation</span><span id="rotVal">0°</span></div>
                <input type="range" id="rotation" min="-180" max="180" value="0">
            </div>
            <div class="mb-3">
                <div class="control-label"><span>Bokeh (Radial Softness)</span></div>
                <input type="range" id="bokeh" min="0" max="60" value="0">
            </div>
        </div>

        <div class="settings-pane hidden" id="colorPane">
            <div class="mb-2">
                <div class="control-label"><span>Red Balance</span></div>
                <input type="range" id="redChan" min="-60" max="60" value="0">
            </div>
            <div class="mb-2">
                <div class="control-label"><span>Green Balance</span></div>
                <input type="range" id="greenChan" min="-60" max="60" value="0">
            </div>
            <div class="mb-2">
                <div class="control-label"><span>Blue Balance</span></div>
                <input type="range" id="blueChan" min="-60" max="60" value="0">
            </div>
            <div class="flex gap-4 mt-2">
                <div class="flex-1">
                    <div class="control-label"><span>Exposure</span></div>
                    <input type="range" id="exposure" min="40" max="160" value="100">
                </div>
                <div class="flex-1">
                    <div class="control-label"><span>Contrast</span></div>
                    <input type="range" id="contrast" min="40" max="160" value="100">
                </div>
            </div>
        </div>

        <div class="settings-pane hidden" id="finishPane">
            <div class="mb-3">
                <div class="control-label"><span>Film Grain Intensity</span></div>
                <input type="range" id="grain" min="0" max="100" value="15">
            </div>
            <div class="mb-3">
                <div class="control-label"><span>Marker Annotation</span></div>
                <input type="text" id="markerText" placeholder="Write on border..." 
                    class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mt-1 text-white marker-font outline-none focus:border-blue-500/50">
            </div>
            <div class="mb-1">
                <div class="control-label"><span>Text Size</span></div>
                <input type="range" id="textSize" min="0.5" max="3" step="0.1" value="1.0">
            </div>
        </div>

        <div class="p-4 flex gap-4">
            <label class="flex-1">
                <div class="w-full py-4 bg-white/5 border border-white/10 text-center rounded-xl font-bold text-[10px] uppercase tracking-widest active:bg-white/10 cursor-pointer">Import</div>
                <input type="file" id="imgInput" accept="image/*" class="hidden">
            </label>
            <button id="exportBtn" class="btn-main flex-[2]">Develop & Save</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    // Pro Dimensions
    const BASE_S = 2400;
    const MARGIN = 160;
    const FOOTER = 640;
    const TOTAL_W = BASE_S + (MARGIN * 2);
    const TOTAL_H = BASE_S + MARGIN + FOOTER;

    // Performance Canvases for advanced effects
    const bokehCanvas = document.createElement('canvas');
    const bCtx = bokehCanvas.getContext('2d');

    // Powerful static noise generation for film grain
    const noiseCanvas = document.createElement('canvas');
    noiseCanvas.width = 512; 
    noiseCanvas.height = 512;
    const nCtx = noiseCanvas.getContext('2d');
    const imgData = nCtx.createImageData(512, 512);
    for(let i=0; i<imgData.data.length; i+=4) {
        const v = Math.random() * 255;
        imgData.data[i] = v;
        imgData.data[i+1] = v;
        imgData.data[i+2] = v;
        imgData.data[i+3] = 255;
    }
    nCtx.putImageData(imgData, 0, 0);
    let noisePattern = null;

    let state = {
        img: null,
        x: 0, y: 0,
        lastX: 0, lastY: 0,
        isDragging: false
    };

    const ctrlIds = ['zoom', 'rotation', 'bokeh', 'exposure', 'contrast', 'redChan', 'greenChan', 'blueChan', 'grain', 'markerText', 'textSize'];
    const ui = {};
    ctrlIds.forEach(id => {
        ui[id] = document.getElementById(id);
        ui[id].oninput = () => {
            if(id === 'zoom') document.getElementById('zoomVal').innerText = parseFloat(ui.zoom.value).toFixed(1) + 'x';
            if(id === 'rotation') document.getElementById('rotVal').innerText = ui.rotation.value + '°';
            draw(false);
        };
    });

    function switchTab(tabId, btn) {
        document.querySelectorAll('.settings-pane').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId + 'Pane').classList.remove('hidden');
        btn.classList.add('active');
    }

    imgInput.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (v) => {
            const img = new Image();
            img.onload = () => {
                state.img = img;
                state.x = 0; state.y = 0;
                ui.zoom.value = 1.0;
                document.getElementById('zoomVal').innerText = '1.0x';
                document.getElementById('emptyState').classList.add('hidden');
                draw(true);
            };
            img.src = v.target.result;
        };
        reader.readAsDataURL(file);
    };

    function draw(highRes = false) {
        if(!state.img) return;
        if(!noisePattern) noisePattern = ctx.createPattern(noiseCanvas, 'repeat');
        
        const s = highRes ? 1 : (800 / TOTAL_W);
        canvas.width = TOTAL_W * s;
        canvas.height = TOTAL_H * s;

        // Base Layer - White Polaroid Paper
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const m = MARGIN * s;
        const b = BASE_S * s;
        
        // Setup Clipping for the Photo Area
        ctx.save();
        ctx.beginPath();
        ctx.rect(m, m, b, b);
        ctx.clip();

        // Image Engine Variables
        const z = parseFloat(ui.zoom.value);
        const r = parseInt(ui.rotation.value) * Math.PI / 180;
        let dw, dh;
        const aspect = state.img.width / state.img.height;
        
        if(aspect > 1) { dh = b * z; dw = dh * aspect; }
        else { dw = b * z; dh = dw / aspect; }

        // Center Coordinate System
        ctx.translate(m + b/2 + state.x * s, m + b/2 + state.y * s);
        ctx.rotate(r);

        const bokehVal = parseFloat(ui.bokeh.value) * s;

        // Draw Sharp Base Image
        ctx.filter = `brightness(${ui.exposure.value}%) contrast(${ui.contrast.value}%)`;
        ctx.drawImage(state.img, -dw/2, -dh/2, dw, dh);
        ctx.filter = 'none';

        // Advanced Radial Bokeh Effect
        if (bokehVal > 0) {
            // Resize performance canvas only if necessary
            if (bokehCanvas.width !== Math.floor(dw) || bokehCanvas.height !== Math.floor(dh)) {
                bokehCanvas.width = Math.floor(dw);
                bokehCanvas.height = Math.floor(dh);
            } else {
                bCtx.clearRect(0, 0, dw, dh);
            }

            // Draw completely blurred image to offscreen canvas
            bCtx.filter = `brightness(${ui.exposure.value}%) contrast(${ui.contrast.value}%) blur(${bokehVal}px)`;
            bCtx.drawImage(state.img, 0, 0, dw, dh);
            bCtx.filter = 'none';

            // Punch a transparent hole in the center to reveal the sharp image underneath
            bCtx.globalCompositeOperation = 'destination-out';
            const cx = dw / 2;
            const cy = dh / 2;
            const gradRadius = Math.min(dw, dh) * 0.45; // Size of the sharp area
            
            const gradient = bCtx.createRadialGradient(cx, cy, 0, cx, cy, gradRadius);
            gradient.addColorStop(0, 'rgba(0,0,0,1)'); // Fully erase center (sharp)
            gradient.addColorStop(0.3, 'rgba(0,0,0,1)'); // Keep sharp
            gradient.addColorStop(1, 'rgba(0,0,0,0)'); // Blend into blur at edges
            
            bCtx.fillStyle = gradient;
            bCtx.fillRect(0, 0, dw, dh);
            bCtx.globalCompositeOperation = 'source-over'; // Reset

            // Apply offscreen canvas onto main canvas
            ctx.drawImage(bokehCanvas, -dw/2, -dh/2, dw, dh);
        }

        // RGB Chemical Balance (Overlay)
        ctx.globalCompositeOperation = 'overlay';
        ctx.fillStyle = `rgb(${128+parseInt(ui.redChan.value)}, ${128+parseInt(ui.greenChan.value)}, ${128+parseInt(ui.blueChan.value)})`;
        ctx.fillRect(-dw, -dh, dw*2, dh*2);
        ctx.globalCompositeOperation = 'source-over';

        ctx.restore(); // Exit clipped & transformed photo area

        // Powerful Film Grain (Applied only to the photo square)
        if(ui.grain.value > 0) {
            ctx.save();
            ctx.beginPath();
            ctx.rect(m, m, b, b);
            ctx.clip();
            
            ctx.globalCompositeOperation = 'overlay';
            ctx.globalAlpha = ui.grain.value / 100; // 0 to 1 intensity
            ctx.fillStyle = noisePattern;
            ctx.fillRect(m, m, b, b);
            ctx.restore();
        }

        // High-Quality Typography
        if(ui.markerText.value) {
            const sizeMultiplier = parseFloat(ui.textSize.value);
            ctx.font = `${100 * s * sizeMultiplier}px 'Permanent Marker'`;
            ctx.fillStyle = "rgba(15,15,30,0.85)";
            ctx.textAlign = "center";
            ctx.save();
            // Position text in the middle of the bottom footer
            ctx.translate(canvas.width/2, (TOTAL_H - FOOTER/2 + (25 * sizeMultiplier)) * s);
            ctx.rotate(-0.015); // Slight tilt for hand-written feel
            ctx.fillText(ui.markerText.value, 0, 0);
            ctx.restore();
        }

        // Auto high-res generation after interactions end
        if(!highRes) {
            clearTimeout(window.rTimer);
            window.rTimer = setTimeout(() => draw(true), 300);
        }
    }

    // --- Interactive Mouse & Touch Manipulation ---
    const viewport = document.getElementById('viewport');
    let initialPinchDist = 0;
    let initialZoom = 1;

    // Mouse Wheel Zoom
    viewport.addEventListener('wheel', (e) => {
        if(!state.img) return;
        e.preventDefault();
        let z = parseFloat(ui.zoom.value);
        z -= e.deltaY * 0.002; // Adjust scroll speed
        z = Math.max(0.5, Math.min(3.5, z)); // Clamp zoom
        ui.zoom.value = z;
        document.getElementById('zoomVal').innerText = z.toFixed(1) + 'x';
        draw(false);
    }, {passive: false});

    // Mouse / Touch Start
    viewport.addEventListener('mousedown', (e) => {
        if(!state.img) return;
        state.isDragging = true;
        state.lastX = e.clientX;
        state.lastY = e.clientY;
    });

    viewport.addEventListener('touchstart', (e) => {
        if(!state.img) return;
        if(e.touches.length === 2) {
            e.preventDefault();
            initialPinchDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            initialZoom = parseFloat(ui.zoom.value);
            state.isDragging = false;
        } else if (e.touches.length === 1) {
            e.preventDefault();
            state.isDragging = true;
            state.lastX = e.touches[0].clientX;
            state.lastY = e.touches[0].clientY;
        }
    }, {passive: false});

    // Mouse / Touch Move
    window.addEventListener('mousemove', (e) => {
        if(!state.isDragging || !state.img) return;
        const f = TOTAL_W / canvas.clientWidth;
        state.x += (e.clientX - state.lastX) * f;
        state.y += (e.clientY - state.lastY) * f;
        state.lastX = e.clientX;
        state.lastY = e.clientY;
        draw(false);
    });

    window.addEventListener('touchmove', (e) => {
        if(!state.img) return;
        
        if(e.touches.length === 2 && initialPinchDist > 0) {
            e.preventDefault();
            const currentDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            let z = initialZoom * (currentDist / initialPinchDist);
            z = Math.max(0.5, Math.min(3.5, z));
            ui.zoom.value = z;
            document.getElementById('zoomVal').innerText = z.toFixed(1) + 'x';
            draw(false);
        } else if(e.touches.length === 1 && state.isDragging) {
            e.preventDefault();
            const f = TOTAL_W / canvas.clientWidth;
            state.x += (e.touches[0].clientX - state.lastX) * f;
            state.y += (e.touches[0].clientY - state.lastY) * f;
            state.lastX = e.touches[0].clientX;
            state.lastY = e.touches[0].clientY;
            draw(false);
        }
    }, {passive: false});

    // Mouse / Touch End
    window.addEventListener('mouseup', () => state.isDragging = false);
    window.addEventListener('touchend', (e) => {
        if(e.touches.length < 2) initialPinchDist = 0;
        if(e.touches.length === 0) state.isDragging = false;
    });

    // Direct Device Download
    exportBtn.onclick = () => {
        if(!state.img) return;
        
        const originalText = exportBtn.innerText;
        exportBtn.innerText = "DEVELOPING...";
        exportBtn.disabled = true;

        // Allow UI to update text before freezing the thread with high-res render
        setTimeout(() => {
            draw(true); // Force high-res calculation
            
            const link = document.createElement('a');
            link.download = `polaroid_${new Date().getTime()}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
            
            exportBtn.innerText = originalText;
            exportBtn.disabled = false;
        }, 50);
    };
</script>
</body>
</html>
